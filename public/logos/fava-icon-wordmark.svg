<?xml version="1.0" encoding="UTF-8"?>
<!--
  FAVA Capital — Mark + FAVA.
  Use for nav, small placements, or anywhere a compact brand mark
  is needed.

  Typography: Fraunces 700 at 46px. Self-contained @import fetches
  the font from Google Fonts when rendered in a browser. For
  design-tool use (Figma, Illustrator, print), outline the text
  to paths to avoid font-dependency.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 80" width="190" height="80" role="img" aria-label="FAVA Capital">
  <title>FAVA Capital</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&amp;display=swap');
    .wordmark { font-family: 'Fraunces', 'Cormorant Garamond', serif; font-weight: 700; font-size: 46px; letter-spacing: -0.02em; fill: #E8E4EC; font-variation-settings: 'opsz' 144; }
  </style>
  <g>
    <rect x="0" y="20" width="8" height="50" rx="1.5" fill="#C4B5FD"/>
    <rect x="12" y="30" width="8" height="40" rx="1.5" fill="#A78BFA"/>
    <rect x="24" y="12" width="8" height="58" rx="1.5" fill="#8B5CF6"/>
    <rect x="36" y="32" width="8" height="38" rx="1.5" fill="#6B3FA0"/>
    <rect x="0" y="44" width="44" height="3" rx="1" fill="#D9B166"/>
  </g>
  <text x="68" y="58" class="wordmark">FAVA</text>
</svg>
